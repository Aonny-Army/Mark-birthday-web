<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ♡</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* reset */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
    overflow-x:hidden;
}

body{

    font-family:'Prompt',sans-serif;

    overflow-x:hidden;

    background:
    linear-gradient(
        180deg,
        #ffffff 0%,
        #f8f3ff 45%,
        #eef7ff 100%
    );

    color:#555;

    position:relative;
}

/* glow */

body::before{

    content:'';

    position:fixed;

    width:340px;
    height:340px;

    background:#d9c3ff;

    filter:blur(120px);

    top:-140px;
    right:-140px;

    opacity:.45;

    z-index:-2;
}

body::after{

    content:'';

    position:fixed;

    width:300px;
    height:300px;

    background:#bde0fe;

    filter:blur(120px);

    bottom:-120px;
    left:-120px;

    opacity:.45;

    z-index:-2;
}

/* hearts */

.heart{

    position:fixed;

    top:-20px;

    color:#ffffffaa;

    font-size:18px;

    z-index:-1;

    animation:fall linear infinite;
}

@keyframes fall{

    to{
        transform:translateY(120vh);
    }
}

/* top */

.top{

    padding:
    90px 22px 40px;

    text-align:center;
}

.small{

    font-size:12px;

    letter-spacing:4px;

    color:#999;

    margin-bottom:16px;
}

h1{

    font-size:42px;

    line-height:1.3;

    margin-bottom:18px;
}

.gradient{

    background:
    linear-gradient(
        90deg,
        #b48cff,
        #7abfff
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.sub{

    font-size:14px;

    line-height:2;

    color:#777;
}

/* floating buttons */

.music-btn,
.scroll-bottom,
.back-btn{

    position:fixed;

    width:54px;
    height:54px;

    border:none;

    border-radius:50%;

    background:
    rgba(255,255,255,.6);

    backdrop-filter:blur(14px);

    box-shadow:
    0 10px 25px rgba(180,180,255,.16);

    color:#9d7dff;

    font-size:18px;

    z-index:999;

    cursor:pointer;

    transition:.3s;
}

/* music */

.music-btn{

    top:20px;
    right:20px;
}

.music-btn.playing{

    animation:spin 4s linear infinite;
}

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* scroll */

.scroll-bottom{

    bottom:24px;
    right:20px;
}

/* back */

.back-btn{

    top:20px;
    left:20px;
}

/* gallery */

.gallery{

    width:100%;

    padding:0 14px 120px;
}

/* row */

.row{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:14px;

    margin-bottom:14px;
}

/* memory */

.memory{

    position:relative;

    overflow:hidden;

    border-radius:30px;

    background:white;

    box-shadow:
    0 14px 35px rgba(180,180,255,.18);

    cursor:pointer;
}

/* sizes */

.big{
    height:520px;
}

.medium{
    height:420px;
}

.small-card{
    height:280px;
}

/* media */

.memory img,
.memory video{

    width:100%;
    height:100%;

    object-fit:cover;

    display:block;

    transition:.7s;
}

.memory:hover img,
.memory:hover video{

    transform:scale(1.05);
}

/* video */

.video-badge{

    position:absolute;

    top:16px;
    right:16px;

    width:44px;
    height:44px;

    border-radius:50%;

    background:
    rgba(255,255,255,.75);

    backdrop-filter:blur(10px);

    display:flex;
    justify-content:center;
    align-items:center;

    color:#8b5cf6;

    font-size:16px;

    z-index:2;
}

/* overlay */

.overlay{

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        180deg,
        transparent 45%,
        rgba(0,0,0,.55) 100%
    );

    display:flex;
    align-items:flex-end;
}

/* caption */

.caption{

    padding:20px;

    color:white;
}

.caption-title{

    font-size:20px;

    margin-bottom:8px;
}

.caption-text{

    font-size:13px;

    line-height:1.8;

    opacity:.92;
}

/* rotate */

.rotate-left{
    transform:rotate(-1.5deg);
}

.rotate-right{
    transform:rotate(1.5deg);
}

/* viewer */

.viewer{

    position:fixed;

    inset:0;

    background:
    rgba(10,10,15,.96);

    display:none;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    z-index:99999;

    padding:20px;

    animation:fade .35s ease;
}

@keyframes fade{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

.viewer.show{

    display:flex;
}

.viewer-content{

    position:relative;

    width:100%;
    max-width:430px;
}

.viewer img,
.viewer video{

    width:100%;

    max-height:78vh;

    object-fit:contain;

    border-radius:28px;

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);
}

/* close */

.close-btn{

    position:absolute;

    top:-55px;
    right:0;

    width:42px;
    height:42px;

    border:none;

    border-radius:50%;

    background:
    rgba(255,255,255,.15);

    color:white;

    font-size:18px;

    cursor:pointer;
}

/* bottom nav */

.bottom-nav{

    position:fixed;

    left:50%;
    transform:translateX(-50%);

    bottom:18px;

    width:calc(100% - 30px);
    max-width:420px;

    padding:14px;

    border-radius:26px;

    background:
    rgba(255,255,255,.55);

    backdrop-filter:blur(14px);

    box-shadow:
    0 10px 30px rgba(180,180,255,.16);

    display:flex;

    gap:12px;

    z-index:999;
}

.nav-btn{

    flex:1;

    border:none;

    border-radius:18px;

    padding:14px;

    font-family:'Prompt',sans-serif;

    font-size:13px;

    cursor:pointer;

    background:white;

    color:#777;

    transition:.3s;
}

.nav-btn:hover{

    transform:translateY(-2px);
}

/* footer */

.footer{

    text-align:center;

    padding-bottom:130px;

    color:#999;

    font-size:12px;
}

</style>

</head>

<body>

<!-- audio -->

<audio id="bgMusic" loop>
    <source src="special-song.mp3" type="audio/mpeg">
</audio>

<!-- music -->

<button class="music-btn" id="musicBtn">
    ♪
</button>

<!-- back -->

<button class="back-btn"
onclick="window.location.href='index.html'">
    ←
</button>

<!-- scroll -->

<button class="scroll-bottom"
onclick="scrollToBottom()">
    ↓
</button>

<!-- hearts -->

<div class="heart" style="left:10%; animation-duration:8s;">♡</div>
<div class="heart" style="left:25%; animation-duration:12s;">♡</div>
<div class="heart" style="left:55%; animation-duration:7s;">♡</div>
<div class="heart" style="left:82%; animation-duration:10s;">♡</div>

<!-- top -->

<section class="top">

    <div class="small">
        OUR MEMORIES
    </div>

    <h1>
        คลังรูปของ<br>
        <span class="gradient">
            พี่มาร์ค ♡
        </span>
    </h1>

    <p class="sub">
        เลื่อนดูไปเรื่อย ๆ นะ :)
    </p>

</section>

<!-- gallery -->

<section class="gallery" id="gallery"></section>

<div class="footer">
    made with love by earn ✨
</div>

<!-- viewer -->

<div class="viewer" id="viewer"></div>

<!-- bottom nav -->

<div class="bottom-nav">

    <button class="nav-btn"
    onclick="window.location.href='index.html'">

        กลับหน้าจดหมาย 🤍

    </button>

    <button class="nav-btn"
    onclick="window.location.href='relationship.html'">

        ไปดูคำถาม 👀

    </button>

</div>

<script>

/* music */

const music =
document.getElementById("bgMusic");

const musicBtn =
document.getElementById("musicBtn");

let playing = false;

musicBtn.addEventListener("click",()=>{

    if(!playing){

        music.play();

        musicBtn.classList.add("playing");

        playing = true;

    }else{

        music.pause();

        musicBtn.classList.remove("playing");

        playing = false;
    }
});

/* captions */

const captions = [

    "วันนั้นมีความสุขมาก :)",
    "รูปโปรดของเอิร์น 🤍",
    "คิดถึงจัง",
    "แฟนใครน่ารักจัง",
    "ยิ้มทีไรใจละลาย",
    "อยู่ด้วยกันไปนาน ๆ นะ",
    "เก็บไว้ทั้งชีวิตเลยได้มั้ย",
    "ขอบคุณที่อยู่ด้วยกัน 🤍"

];

/* gallery */

const gallery =
document.getElementById("gallery");

let photoIndex = 1;
let videoIndex = 1;

const totalPhotos = 100;
const totalVideos = 2;

/* random caption */

function randomCaption(){

    return captions[
        Math.floor(
            Math.random()*captions.length
        )
    ];
}

/* helper */

function createImageCard(size,rotate,index,title){

    return `

    <div class="memory ${size} ${rotate}"
    onclick="openImage('photos/photo (${index}).jpg')">

        <img
        src="photos/photo (${index}).jpg"
        loading="lazy">

        <div class="overlay">

            <div class="caption">

                <div class="caption-title">
                    ${title}
                </div>

                <div class="caption-text">
                    ${randomCaption()}
                </div>

            </div>

        </div>

    </div>

    `;
}

function createVideoCard(index){

    return `

    <div class="memory medium rotate-right"
    onclick="openVideo('videos/video (${index}).mp4')">

        <video
        autoplay
        muted
        loop
        playsinline>

            <source
            src="videos/video (${index}).mp4"
            type="video/mp4">

        </video>

        <div class="video-badge">
            ▶
        </div>

    </div>

    `;
}

/* build gallery */

while(photoIndex <= totalPhotos){

    /* BIG */

    gallery.innerHTML +=
    createImageCard(
        "big",
        "rotate-left",
        photoIndex,
        "memory ✨"
    );

    photoIndex++;

    /* SMALL SMALL */

    if(photoIndex + 1 <= totalPhotos){

        gallery.innerHTML += `

        <div class="row">

            <div class="memory small-card rotate-right"
            onclick="openImage('photos/photo (${photoIndex}).jpg')">

                <img
                src="photos/photo (${photoIndex}).jpg"
                loading="lazy">

            </div>

            <div class="memory small-card rotate-left"
            onclick="openImage('photos/photo (${photoIndex+1}).jpg')">

                <img
                src="photos/photo (${photoIndex+1}).jpg"
                loading="lazy">

            </div>

        </div>

        `;

        photoIndex += 2;
    }

    /* VIDEO / MEDIUM */

    if(photoIndex % 10 === 0
    && videoIndex <= totalVideos){

        gallery.innerHTML +=
        createVideoCard(videoIndex);

        videoIndex++;

    }else{

        if(photoIndex <= totalPhotos){

            gallery.innerHTML +=
            createImageCard(
                "medium",
                "rotate-right",
                photoIndex,
                "our day ♡"
            );

            photoIndex++;
        }
    }

    /* SMALL SMALL */

    if(photoIndex + 1 <= totalPhotos){

        gallery.innerHTML += `

        <div class="row">

            <div class="memory small-card rotate-left"
            onclick="openImage('photos/photo (${photoIndex}).jpg')">

                <img
                src="photos/photo (${photoIndex}).jpg"
                loading="lazy">

            </div>

            <div class="memory small-card rotate-right"
            onclick="openImage('photos/photo (${photoIndex+1}).jpg')">

                <img
                src="photos/photo (${photoIndex+1}).jpg"
                loading="lazy">

            </div>

        </div>

        `;

        photoIndex += 2;
    }

    /* BIG */

    if(photoIndex <= totalPhotos){

        gallery.innerHTML +=
        createImageCard(
            "big",
            "rotate-right",
            photoIndex,
            "our memory ♡"
        );

        photoIndex++;
    }
}

/* autoplay preview videos */

document
.querySelectorAll(".memory video")
.forEach(video=>{

    video.play().catch(()=>{});
});

/* viewer */

const viewer =
document.getElementById("viewer");

function openImage(src){

    viewer.classList.add("show");

    viewer.innerHTML = `

    <div class="viewer-content">

        <button class="close-btn"
        onclick="closeViewer(event)">

            ✕

        </button>

        <img src="${src}">

    </div>

    `;
}

function openVideo(src){

    viewer.classList.add("show");

    viewer.innerHTML = `

    <div class="viewer-content">

        <button class="close-btn"
        onclick="closeViewer(event)">

            ✕

        </button>

        <video
        src="${src}"
        controls
        autoplay
        playsinline>

        </video>

    </div>

    `;
}

function closeViewer(event){

    if(event){
        event.stopPropagation();
    }

    viewer.classList.remove("show");

    viewer.innerHTML = "";
}

/* click outside close */

viewer.addEventListener("click",(e)=>{

    if(e.target === viewer){

        closeViewer();
    }
});

/* scroll */

function scrollToBottom(){

    window.scrollTo({

        top:document.body.scrollHeight,

        behavior:"smooth"

    });
}

/* hide scroll button */

window.addEventListener("scroll",()=>{

    const button =
    document.querySelector(".scroll-bottom");

    if(window.innerHeight + window.scrollY
    >= document.body.offsetHeight - 120){

        button.style.opacity = "0";

    }else{

        button.style.opacity = "1";
    }

});

</script>

</body>
</html>
